<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 정보 퀴즈 배틀!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="login-screen">
            <h1>💻 실시간 정보 퀴즈 💻</h1>
            <input type="text" id="student-name" placeholder="이름을 입력하세요 (학생용)">
            <button id="join-btn" class="primary-btn">학생으로 참여하기</button>
            <hr>
            <button id="teacher-btn" class="secondary-btn">교사 모드로 열기</button>
        </div>

        <div id="waiting-screen" class="hidden">
            <h2>대기 중... ⏳</h2>
            <p>선생님이 퀴즈를 시작할 때까지 기다려주세요.</p>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="header-info">
                <span id="question-number">문제 1 / 5</span>
                <span id="timer">⏱️ <span id="time-left">10</span>초</span>
            </div>
            <h2 id="question">여기에 문제가 표시됩니다.</h2>
            <div id="options" class="options-container">
                </div>
            
            <div id="teacher-controls" class="hidden">
                <button id="next-btn" class="primary-btn">다음 문제로 넘기기</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>퀴즈 종료! 🎉</h2>
            <p id="final-score">내 점수: 0점</p>
            <div id="leaderboard">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
