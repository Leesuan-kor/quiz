<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학기 정보 총정리 퀴즈!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>💻 1학기 정보 총정리 퀴즈 💻</h1>
        <div id="quiz">
            <div class="question-info">
                <span id="question-number">문제 1 / 5</span>
                <span id="score">현재 점수: 0점</span>
            </div>
            <h2 id="question">여기에 문제가 표시됩니다.</h2>
            <div id="options" class="options-container">
                </div>
            <button id="next-btn" class="hidden">다음 문제로</button>
        </div>
        <div id="result" class="hidden">
            <h2>퀴즈 완료! 🎉</h2>
            <p id="final-score">당신의 점수는?</p>
            <button id="restart-btn">다시 풀기</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
